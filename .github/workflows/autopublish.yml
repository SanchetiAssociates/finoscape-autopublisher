name: Finoscape Daily Auto-Publisher

on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Check secrets are set
        run: |
          echo "WP_URL set: ${{ secrets.WP_URL != '' }}"
          echo "GEMINI_API_KEY set: ${{ secrets.GEMINI_API_KEY != '' }}"
          echo "WP_APP_PASS set: ${{ secrets.WP_APP_PASS != '' }}"
          echo "GMAIL_PASS set: ${{ secrets.GMAIL_PASS != '' }}"

      - name: Run auto-publisher
        env:
          WP_URL: ${{ secrets.WP_URL }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASS: ${{ secrets.WP_APP_PASS }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
        run: python autopublish.py
